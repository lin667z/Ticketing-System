server:
  port: 9000
spring:
  application:
    name: index12306-gateway${unique-name:}-service
  profiles:
    active: dev,local
  cloud:
    nacos:
      discovery:
        server-addr: ${nacos.server-addr}

management:
  endpoints:
    web:
      exposure:
        include: '*'
  metrics:
    tags:
      application: ${spring.application.name}